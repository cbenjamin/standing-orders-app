<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 1200px; height: 1200px; overflow: hidden; }
</style>
</head>
<body>
<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3db870"/>
      <stop offset="100%" stop-color="#1a5c38"/>
    </linearGradient>
    <radialGradient id="sheen" cx="28%" cy="22%" r="55%">
      <stop offset="0%" stop-color="white" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="26" flood-color="#0d3b20" flood-opacity="0.40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1200" rx="230" ry="230" fill="url(#bg)"/>
  <rect width="1200" height="1200" rx="230" ry="230" fill="url(#sheen)"/>

  <!--
    Circle center: (600, 590)  Radius: 310
    Point(θ) = (600 + 310·cosθ,  590 + 310·sinθ)

    Gaps at LEFT (~180°) and RIGHT (~0°/360°).
    Arcs end/start 25° away from the gap, leaving space for arrowheads IN the gap.

    ARC 1 — bottom half, CW 25° → 155°
      25°:  (881, 721)
     155°:  (319, 721)

    ARC 2 — top half, CW 205° → 335°
     205°:  (319, 459)
     335°:  (881, 459)

    LEFT gap: x≈290, y=459 to 721. Arrowhead points UP (CW at 180°).
      Tip:  (290, 548)
      Base: (290, 638)
      Wings: (252, 638)  (328, 638)

    RIGHT gap: x≈910, y=459 to 721. Arrowhead points DOWN (CW at 0°).
      Tip:  (910, 638)
      Base: (910, 548)
      Wings: (872, 548)  (948, 548)
  -->

  <g filter="url(#shadow)">
    <!-- ARC 1: bottom half -->
    <path d="M 881,721 A 310,310 0 0 1 319,721"
          stroke="white" stroke-width="82" fill="none" stroke-linecap="round" opacity="0.93"/>

    <!-- ARC 2: top half -->
    <path d="M 319,459 A 310,310 0 0 1 881,459"
          stroke="white" stroke-width="82" fill="none" stroke-linecap="round" opacity="0.93"/>

    <!-- LEFT arrowhead — in the gap, pointing UP -->
    <polygon points="290,548  252,638  328,638" fill="white" opacity="0.93"/>

    <!-- RIGHT arrowhead — in the gap, pointing DOWN -->
    <polygon points="910,638  872,548  948,548" fill="white" opacity="0.93"/>
  </g>

  <!-- BOX centered at (600, 590) -->
  <g filter="url(#shadow)">
    <!-- Body -->
    <rect x="460" y="509" width="280" height="210" rx="10" fill="white"/>

    <!-- Lid -->
    <path d="M 460,509 L 600,461 L 740,509 Z" fill="rgba(255,255,255,0.90)"/>
    <path d="M 460,509 L 530,485 L 530,509 Z" fill="rgba(0,0,0,0.05)"/>
    <path d="M 740,509 L 670,485 L 670,509 Z" fill="rgba(0,0,0,0.04)"/>

    <!-- Ribbon -->
    <rect x="583" y="461" width="34" height="258" rx="4" fill="rgba(26,92,56,0.20)"/>

    <!-- Knot -->
    <circle cx="600" cy="481" r="16" fill="rgba(215,238,226,1)" stroke="rgba(26,92,56,0.28)" stroke-width="3"/>
  </g>
</svg>
</body>
</html>
